<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Harb — builder from Syria, based in New York City">
  <defs>
    <linearGradient id="nameGrad" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="760" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.5" stop-color="#0369a1"/>
      <stop offset="1" stop-color="#b45309"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-300 0; 300 0; -300 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="starGrad" gradientUnits="userSpaceOnUse" x1="930" y1="60" x2="1090" y2="220">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="0.12" cy="0" r="0.9">
      <stop offset="0" stop-color="#0d9488" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="0.95" cy="1" r="0.8">
      <stop offset="0" stop-color="#d97706" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="278" rx="18" fill="#fdfbf6" stroke="#e8e1d1" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="278" rx="18" fill="url(#glowTeal)"/>
  <rect x="1" y="1" width="1198" height="278" rx="18" fill="url(#glowAmber)"/>

  <!-- khatam — eight-point star, Damascus mother-of-pearl motif -->
  <g transform="translate(1010 140)">
    <g stroke="url(#starGrad)" fill="none" opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="120s" repeatCount="indefinite"/>
      <rect x="-78" y="-78" width="156" height="156" stroke-width="1.5"/>
      <rect x="-78" y="-78" width="156" height="156" stroke-width="1.5" transform="rotate(45)"/>
    </g>
    <g stroke="url(#starGrad)" fill="none" opacity="0.75">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="80s" repeatCount="indefinite"/>
      <rect x="-46" y="-46" width="92" height="92" stroke-width="1.2"/>
      <rect x="-46" y="-46" width="92" height="92" stroke-width="1.2" transform="rotate(45)"/>
    </g>
    <circle r="14" fill="none" stroke="url(#starGrad)" stroke-width="1" opacity="0.55"/>
    <circle r="4.5" fill="url(#starGrad)"/>
  </g>

  <text x="62" y="76" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="26" fill="#b45309" opacity="0.95">أهلًا وسهلًا</text>

  <text x="58" y="162" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="84" font-weight="800" letter-spacing="6" fill="url(#nameGrad)">Harb</text>

  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" fill="#44546a">
    <text x="62" y="206" opacity="0">
      building nested.social — a project network for NYC students
      <animate attributeName="opacity" values="0;0.95;0.95;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="18s" begin="0s" repeatCount="indefinite"/>
    </text>
    <text x="62" y="206" opacity="0">
      founded nawartu.com — authentic stays across the Levant
      <animate attributeName="opacity" values="0;0.95;0.95;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="18s" begin="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="62" y="206" opacity="0">
      tech lead @ Universal Cellular NYC — I build the machine behind the store
      <animate attributeName="opacity" values="0;0.95;0.95;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="18s" begin="9s" repeatCount="indefinite"/>
    </text>
    <text x="62" y="206" opacity="0">
      code &#215; media — I ship it, then I make it seen
      <animate attributeName="opacity" values="0;0.95;0.95;0;0" keyTimes="0;0.03;0.21;0.25;1" dur="18s" begin="13.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="62" y="252" font-family="Consolas, 'Cascadia Code', monospace" font-size="15" fill="#7a8aa0" opacity="0.9">SYR &#9992; NYC &#183; verso le nuvole &#9729;</text>
</svg>
